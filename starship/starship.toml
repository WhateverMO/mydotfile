"""

[fill]
symbol = 'оҪҢ'

[nix_shell]
symbol = "пҢ“ "
style = 'bold dimmed blue'
format = '[$symbol nixвҺӘ$stateвҺӘ]($style) [$name](dimmed blue)'
impure_msg = '[вҢҪ](bold dimmed red)'
pure_msg = '[вҢҫ](bold dimmed green)'
unknown_msg = '[в—Ң](bold dimmed ellow)'

[os]
style = "fg:blue"
# disabled = true      # Disabled by default
disabled = false # Disabled by default

[username]
style_user = "bright-yellow bold"
style_root = "purple bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
format = '[$ssh_symbol$hostname]($style) '
ssh_symbol = "о¬Ғ "
ssh_only = false

[localip]
ssh_only = true
format = " @[$localipv4](bold magenta)"
disabled = false

[shell]
bash_indicator = "оқ  "
fish_indicator = 'о№Ғ '
zsh_indicator = "оқё "
ion_indicator = "оҷ« "
cmd_indicator = "оҜ„ "
powershell_indicator = 'оЎ¬ '
unknown_indicator = 'о¬І >_'
style = 'cyan bold'
disabled = false

[shlvl]
disabled = false
format = '[$symbol$shlvl]($style) '
repeat = true
symbol = 'вқҜ'
repeat_offset = 1
threshold = 0

[directory]
truncation_length = 4
truncation_symbol = "пҒј вҖҰ/"
read_only = " у°Ңҫ"
use_os_path_sep = true
style = "blue"
format = '[$path]($style)[$read_only]($read_only_style)'
repo_root_style = 'bold blue'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [в–і](bold bright-blue)'

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "у°Ҳҷ"
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"~" = "пҖ• ~"
# Keep in mind that the order matters. For example:
# "Important Documents" = " у°Ҳҷп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important у°Ҳҷ " = " у°Ҳҷп„Ә "

[fossil_branch]
symbol = "пҗҳ "

[git_branch]
format = " [$symbol$branch(:$remote_branch)]($style) "
symbol = "у°Ҡў "
truncation_symbol = "вӢҜ"
truncation_length = 11
# ignore_branches = ["main", "master"]
only_attached = true

[git_commit]
tag_symbol = ' пҗ’ '

[git_status]
style = "bold bright-blue"
# format = "[вҺӘ$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashedвҺҘ]($style)"
format = '[\($state( $progress_current of $progress_total)$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashed\)]($style) '
# format = '[\($state( $progress_current of $progress_total)\)]($style) '
conflicted = "[в—Әв—Ұ](bright-magenta)"
ahead = "[в–ҙв”Ӯ[${count}](bold blue)в”Ӯ](green)"
behind = "[в–ҝв”Ӯ[${count}](bold blue)в”Ӯ](red)"
diverged = "[в—Ү в–ҙв”Ө[${ahead_count}](regular blue)в”Ӯв–ҝв”Ө[${behind_count}](regular white)в”Ӯ](bright-magenta)"
untracked = "[в—Ңв—Ұ](bright-yellow)"
stashed = "[в—ғв—Ҳ](blue)"
modified = "[в—Ҹв—Ұ](yellow)"
staged = "[в–Әв”Ө[$count](bold blue)в”Ӯ](bright-cyan)"
renamed = "[в—Һв—Ұ](bright-blue)"
deleted = "[вң•](red)"

[git_metrics]
format = '([в–ҙ$added]($added_style))([в–ҝ$deleted]($deleted_style))'
added_style = 'dimmed green'
deleted_style = 'dimmed red'
ignore_submodules = true
disabled = false

[memory_usage]
symbol = "оҝ… "
format = "$symbol[${ram}( ${swap})]($style)"
disabled = false
threshold = 70

[spack]
symbol = "в—Ү "
format = " spack [$symbol$environment]($style)"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "в–Ҳ"
charging_symbol = "[вҶ‘](bold green)"
discharging_symbol = "вҶ“"
unknown_symbol = "в–‘"
empty_symbol = "в–ғ"

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 60
style = "dimmed bright-purple"

[[battery.display]]
threshold = 70
style = "dimmed yellow"

[time]
disabled = false
format = "[$time]($style)"
time_format = "%D %r"
utc_time_offset = "local"
style = "dimmed blue"


[cmd_duration]
format = "[в—„ $duration ](blue)"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = 'green'

[jobs]
format = "[$symbol:$number]($style) "
style = "bold blue"
symbol = "[п”һ bg](bold red)"

[sudo]
format = "[$symbol]($style)"
style = "bold bright-purple"
symbol = "у°»Ў "
disabled = false

[character]
format = "$symbol"
success_symbol = '[вһң](bold green) '
error_symbol = '[вң—](bold red) '
vimcmd_symbol = "[в– ](dimmed green) "
# not supported in zsh
vimcmd_replace_one_symbol = "в—Ң"
vimcmd_replace_symbol = "в–Ў"
vimcmd_visual_symbol = "в–ј"

